<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>音あてっこ</title>
<style>
  :root{
    --bg:#151E27; --surface:#1D2833; --surface-2:#243140; --edge:#2E3E4F;
    --ink:#F2EEE4; --ink-dim:#9DB0C2;
    --brass:#D4A72C; --brass-dim:rgba(212,167,44,.18);
    --sage:#6FA86B; --sage-dim:rgba(111,168,107,.18);
    --clay:#C85C5C; --clay-dim:rgba(200,92,92,.18);
    --ivory:#F4EFE3; --wood:#201915; --ebony:#2B2320;
    --r:14px;
    --ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --serif:Georgia,"Times New Roman","Hiragino Mincho ProN","Yu Mincho",YuMincho,"Noto Serif JP","Songti SC",serif;
    --round:"Hiragino Maru Gothic ProN","Hiragino Maru Gothic Pro","Yu Gothic UI","Zen Maru Gothic","Rounded Mplus 1c","M PLUS Rounded 1c","Quicksand",var(--ui);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--ui);
    -webkit-font-smoothing:antialiased;
    padding:16px 14px calc(28px + env(safe-area-inset-bottom));line-height:1.5;
  }
  .wrap{max-width:680px;margin:0 auto;}

  .topbar{margin:2px 0 16px;}
  .brand{
    display:flex;align-items:center;justify-content:center;gap:10px;
    margin:0;font-weight:400;
  }
  .brand .name{
    font-family:var(--round);font-size:24px;font-weight:600;
    letter-spacing:4px;text-indent:4px;color:var(--ink);white-space:nowrap;
  }
  .brand .mark{color:var(--brass);font-size:12px;opacity:.85;}
  .brand .rule{
    flex:1 1 0;max-width:62px;height:1px;
    background:linear-gradient(90deg,transparent,var(--edge));
  }
  .brand .rule:last-child{background:linear-gradient(90deg,var(--edge),transparent);}

  /* Session progress — 区切りと達成感 */
  .session{margin-bottom:12px;}
  .session-head{
    display:flex;justify-content:space-between;align-items:baseline;
    font-size:11px;color:var(--ink-dim);margin-bottom:5px;letter-spacing:.4px;
  }
  .pips{display:flex;gap:4px;}
  .pip{
    flex:1;height:5px;border-radius:3px;background:var(--surface-2);
    transition:background .25s;
  }
  .pip.ok{background:var(--sage);}
  .pip.ng{background:var(--clay);}
  .pip.now{background:var(--brass);}

  /* セット行 */
  .set-row{
    display:flex;align-items:baseline;gap:9px;
    margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--edge);
  }
  .set-no{
    font-size:12px;color:var(--ink);font-weight:600;
    letter-spacing:.4px;flex-shrink:0;
  }
  .stars{display:flex;flex-wrap:wrap;gap:3px;align-items:center;min-width:0;}
  .star{font-size:13px;line-height:1.15;}
  .star.green{color:#6FBF6A;}
  .star.yellow{color:#E0B93C;}
  .star.red{color:#D45F5F;}
  .star.perfect{text-shadow:0 0 7px rgba(111,191,106,.85);}
  .star-hint{font-size:10.5px;color:var(--ink-dim);opacity:.7;}

  /* 習熟度 */
  .mastery{display:flex;flex-direction:column;gap:9px;}
  .m-row{display:flex;align-items:center;gap:10px;font-size:12px;}
  .m-name{
    flex:0 0 84px;color:var(--ink-dim);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .m-pct{
    flex:0 0 34px;text-align:right;font-family:var(--mono);
    font-size:11px;color:var(--ink);
  }
  .m-row.done .m-name{color:var(--ink);}
  .m-row.done .m-pct{color:#6FBF6A;font-weight:600;}
  .m-bar{display:block;flex:1;height:8px;background:var(--surface-2);border-radius:5px;overflow:hidden;min-width:40px;}
  .m-fill{display:block;height:100%;border-radius:5px;background:#6FBF6A;transition:width .35s;}
  .m-fill.mid{background:#E0B93C;}
  .m-fill.low{background:#D45F5F;}
  .m-num{
    flex:0 0 62px;text-align:right;font-family:var(--mono);
    display:flex;align-items:baseline;justify-content:flex-end;gap:2px;
  }
  .m-num b{font-size:12.5px;font-weight:600;color:var(--ink);font-style:normal;}
  .m-num i{font-size:10px;color:var(--ink-dim);font-style:normal;opacity:.85;}
  .m-num.full b{color:#6FBF6A;}
  .m-row.done .m-name{color:var(--ink);}
  .m-row.done .m-num b{color:#6FBF6A;}
  .m-row.done .m-fill{box-shadow:0 0 6px rgba(111,191,106,.6);}
  .m-head{
    display:flex;align-items:center;gap:10px;
    font-size:9.5px;letter-spacing:.6px;color:var(--ink-dim);opacity:.75;
    padding-bottom:8px;margin-bottom:10px;border-bottom:1px solid var(--edge);
  }
  .m-head .m-name{flex:0 0 84px;}
  .m-head .m-bar-label{margin-left:44px;}
  .m-head .m-bar-label{flex:1;min-width:40px;}
  .m-head .m-num-label{flex:0 0 58px;text-align:right;}
  .m-empty{font-size:12px;color:var(--ink-dim);margin:0;}

  .prompt{
    background:var(--surface);border:1px solid var(--edge);border-radius:var(--r);
    padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;min-height:78px;
    position:relative;overflow:hidden;
  }
  .prompt.correct{border-color:var(--sage);background:linear-gradient(var(--sage-dim),var(--sage-dim)),var(--surface);}
  .prompt.wrong{border-color:var(--clay);background:linear-gradient(var(--clay-dim),var(--clay-dim)),var(--surface);}
  .prompt.info{border-color:var(--brass);background:linear-gradient(var(--brass-dim),var(--brass-dim)),var(--surface);}
  .prompt-icon{
    width:40px;height:40px;flex-shrink:0;border-radius:50%;display:grid;place-items:center;
    font-size:18px;background:var(--surface-2);color:var(--brass);
  }
  .prompt.correct .prompt-icon{background:var(--sage);color:#0f1a0f;}
  .prompt.wrong .prompt-icon{background:var(--clay);color:#1a0f0f;}
  .prompt-body{min-width:0;flex:1;}
  .prompt-title{font-size:15px;font-weight:600;margin:0 0 3px;}
  .prompt-sub{font-size:12px;color:var(--ink-dim);margin:0;font-family:var(--mono);letter-spacing:.3px;}
  .prompt-hint{font-size:11.5px;color:var(--brass);margin:4px 0 0;}
  .give-up{
    appearance:none;background:transparent;border:none;cursor:pointer;
    align-self:flex-start;flex-shrink:0;
    font-family:var(--ui);font-size:11px;color:var(--ink-dim);
    text-decoration:underline;text-underline-offset:3px;
    padding:2px 0 2px 8px;
  }
  .give-up:hover{color:var(--ink);}
  .give-up[hidden]{display:none;}


  /* 制限時間 */
  .timer-row{display:flex;align-items:center;gap:9px;margin-bottom:12px;}
  .timer-row[hidden]{display:none;}
  .timer-bar{
    flex:1;height:5px;background:var(--surface-2);
    border-radius:3px;overflow:hidden;
  }
  .timer-fill{display:block;height:100%;width:100%;background:var(--sage);border-radius:3px;}
  .timer-fill.warn{background:var(--brass);}
  .timer-fill.crit{background:var(--clay);}
  .timer-num{
    flex:0 0 26px;text-align:right;font-family:var(--mono);
    font-size:12px;font-weight:600;color:var(--sage);
  }
  .timer-num.warn{color:var(--brass);}
  .timer-num.crit{color:var(--clay);}


  .piano-card{
    background:var(--wood);border-radius:var(--r);padding:10px 10px 0;margin:0 auto 10px;
    border:1px solid #0d0a08;max-width:420px;
  }
  .piano{position:relative;display:flex;height:170px;touch-action:manipulation;user-select:none;-webkit-user-select:none;}
  .wk{
    position:relative;flex:1 1 0;min-width:0;background:var(--ivory);border:1px solid #cfc7b4;
    border-top:none;border-radius:0 0 5px 5px;margin-right:-1px;cursor:pointer;
    display:flex;align-items:flex-end;justify-content:center;padding-bottom:7px;z-index:1;
    transition:background .04s linear;touch-action:manipulation;
  }
  .wk:last-of-type{margin-right:0;}
  .bk{
    position:absolute;top:0;height:62%;background:linear-gradient(#3a2f2a,var(--ebony));
    border:1px solid #0a0705;border-top:none;border-radius:0 0 4px 4px;cursor:pointer;z-index:2;
    display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;
    transition:background .04s linear;touch-action:manipulation;
  }
  .lbl{font-family:var(--mono);font-size:11px;pointer-events:none;letter-spacing:.2px;line-height:1;}
  .deg{
    position:absolute;left:0;right:0;text-align:center;pointer-events:none;
    font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.2px;
    line-height:1;opacity:0;transition:opacity .15s;
  }
  .wk .deg{bottom:24px;color:#2f3d2c;}
  .bk .deg{bottom:22px;color:var(--ivory);}
  .show-deg .deg{opacity:1;}
  .wk.ng .deg,.bk.ng .deg{opacity:0;}
  .wk .lbl{color:#8c8474;}
  .bk .lbl{color:#a89e8d;}
  .hide-labels .lbl{visibility:hidden;}
  @media (hover:hover){ .wk:hover{background:#e9e2d0;} .bk:hover{background:#4a3d36;} }
  .wk.on,.bk.on{background:var(--brass);}
  .bk.on .lbl{color:#3a2c05;}
  .wk.ok{background:var(--sage);}
  .bk.ok{background:var(--sage);border-color:#3d5c3b;}
  .wk.ng{background:var(--clay);}
  .bk.ng{background:var(--clay);border-color:#6b2f2f;}
  .wk.miss,.bk.miss{box-shadow:inset 0 0 0 3px var(--brass);}
  .piano.frozen .wk,.piano.frozen .bk{cursor:pointer;}
  .wk:focus-visible,.bk:focus-visible{outline:2px solid var(--brass);outline-offset:-2px;}

  .readout{
    font-family:var(--mono);font-size:12px;color:var(--ink-dim);margin:0 0 14px;min-height:17px;
    text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .readout b{color:var(--ink);font-weight:600;}

  .actions{display:flex;gap:8px;margin-bottom:14px;}
  .actions .btn-ghost{flex:1;}
  .actions .btn-primary{flex:1.6;}
  .btn{
    appearance:none;border:none;cursor:pointer;font-family:var(--ui);font-size:14px;font-weight:600;
    border-radius:12px;padding:14px 16px;
    transition:filter .12s,opacity .12s,background .12s,border-color .12s;
    touch-action:manipulation;white-space:nowrap;
  }
  .btn:active:not(:disabled){filter:brightness(.92);}
  .btn:disabled{opacity:.35;cursor:not-allowed;}
  .btn-primary{background:var(--brass);color:#1c1503;flex:2;}
  .btn-ghost{background:transparent;color:var(--ink-dim);border:1px solid var(--edge);flex:1;font-weight:500;}
  .btn-ghost:hover:not(:disabled){color:var(--ink);border-color:var(--brass);}

  /* Mastery panel */
  details.panel{
    background:var(--surface);border:1px solid var(--edge);border-radius:var(--r);
    overflow:hidden;margin-bottom:10px;
  }
  details.panel summary{
    cursor:pointer;list-style:none;padding:14px 16px;font-size:13px;color:var(--ink-dim);
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  details.panel summary::-webkit-details-marker{display:none;}
  summary .chev{transition:transform .18s;color:var(--ink-dim);}
  details[open] summary .chev{transform:rotate(180deg);}
  summary .current{color:var(--ink);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
  .panel-body{padding:0 16px 16px;border-top:1px solid var(--edge);padding-top:14px;}
  .sec-label{font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-dim);margin:0 0 9px;}
  .panel-body > .sec-label:not(:first-child){margin-top:20px;}
  .presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
  .preset{
    appearance:none;cursor:pointer;font-family:var(--ui);font-size:11px;background:transparent;
    color:var(--ink-dim);border:1px solid var(--edge);border-radius:8px;padding:5px 10px;
  }
  .preset:hover{color:var(--ink);border-color:var(--brass);}
  .preset[aria-pressed="true"]{background:var(--brass-dim);border-color:var(--brass);color:var(--ink);font-weight:600;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px;}
  .chip{
    appearance:none;cursor:pointer;font-family:var(--ui);font-size:12.5px;background:transparent;
    color:var(--ink-dim);border:1px solid var(--edge);border-radius:999px;padding:7px 13px;
    transition:background .12s,border-color .12s,color .12s;
  }
  .chip:hover{border-color:var(--brass);}
  .chip[aria-pressed="true"]{background:var(--brass-dim);border-color:var(--brass);color:var(--ink);font-weight:600;}
  .chip .sym{font-family:var(--mono);font-size:10px;opacity:.65;margin-left:5px;}

  .opt-row{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    margin-top:16px;padding-top:14px;border-top:1px solid var(--edge);
  }
  .opt-row label{font-size:13px;color:var(--ink);}
  .opt-row .hint{display:block;font-size:11px;color:var(--ink-dim);margin-top:2px;}
  .switch{
    position:relative;width:44px;height:26px;flex-shrink:0;background:var(--surface-2);
    border:1px solid var(--edge);border-radius:999px;cursor:pointer;transition:background .15s;
  }
  .switch::after{
    content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;
    background:var(--ink-dim);transition:transform .15s,background .15s;
  }
  .switch[aria-checked="true"]{background:var(--brass-dim);border-color:var(--brass);}
  .switch[aria-checked="true"]::after{transform:translateX(18px);background:var(--brass);}

  /* 平均100%のお祝い */
  .cheer{
    position:fixed;inset:0;z-index:50;display:grid;place-items:center;
    background:rgba(10,15,20,.72);padding:24px;
    animation:cheerIn .22s ease-out;
  }
  .cheer[hidden]{display:none;}
  .cheer-card{
    background:var(--surface);border:1px solid var(--brass);border-radius:18px;
    padding:26px 24px 22px;max-width:320px;width:100%;text-align:center;
    box-shadow:0 18px 50px rgba(0,0,0,.5);
    animation:cheerPop .28s cubic-bezier(.2,1.4,.5,1);
  }
  .cheer-mark{
    display:flex;justify-content:center;align-items:center;
    gap:4px;line-height:1;margin-bottom:13px;min-height:34px;
  }
  .cheer-mark span{
    font-size:26px;color:var(--brass);
    text-shadow:0 0 14px rgba(212,167,44,.65);
    animation:starIn .34s backwards cubic-bezier(.2,1.5,.5,1);
  }
  .cheer-mark.solo span{font-size:34px;text-shadow:0 0 18px rgba(212,167,44,.7);}
  .cheer-mark .count{
    font-family:var(--round);font-size:22px;font-weight:600;
    color:var(--brass);text-shadow:none;
  }
  @keyframes starIn{from{transform:scale(.3) rotate(-25deg);opacity:0}to{transform:none;opacity:1}}
  .cheer-title{
    font-family:var(--round);font-size:20px;font-weight:600;
    margin:0 0 10px;letter-spacing:1px;
  }
  .cheer-body{font-size:13.5px;color:var(--ink-dim);line-height:1.9;margin:0 0 20px;}
  .cheer-close{width:100%;flex:none;}
  @keyframes cheerIn{from{opacity:0}to{opacity:1}}
  @keyframes cheerPop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  @media (prefers-reduced-motion:reduce){
    .cheer,.cheer-card{animation:none;}
  }

  footer{margin-top:18px;text-align:center;font-size:11.5px;color:var(--ink-dim);line-height:1.8;}
  kbd{
    font-family:var(--mono);font-size:10.5px;background:var(--surface-2);
    border:1px solid var(--edge);border-radius:4px;padding:1px 5px;color:var(--ink);
  }
  @media (max-width:420px){
    .piano{height:150px;} .brand .name{font-size:20px;letter-spacing:4px;text-indent:4px;}
    .m-name{flex-basis:80px;}
  }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important;} }
</style>
</head>
<body>
<div class="wrap">

  <header class="topbar">
    <h1 class="brand">
      <span class="rule"></span>
      <span class="mark">♪</span>
      <span class="name">音あてっこ</span>
      <span class="mark">♪</span>
      <span class="rule"></span>
    </h1>
  </header>

  <div class="session">
    <div class="set-row">
      <span class="set-no" id="setLabel">セット 1</span>
      <div class="stars" id="stars"></div>
    </div>
    <div class="session-head">
      <span id="sessionLabel">1/10問</span>
    </div>
    <div class="pips" id="pips"></div>
  </div>

  <div class="timer-row" id="timer" hidden>
    <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
    <span class="timer-num" id="timerNum">—</span>
  </div>

  <div class="prompt" id="prompt">
    <div class="prompt-icon" id="promptIcon">♪</div>
    <div class="prompt-body">
      <p class="prompt-title" id="promptTitle">スタートを押すと問題が鳴ります</p>
      <p class="prompt-sub" id="promptSub">鳴った音を鍵盤から選んでください</p>
      <p class="prompt-hint" id="promptHint" hidden></p>
    </div>
    <button class="give-up" id="revealBtn" hidden>答えを見る</button>
  </div>

  <div class="piano-card">
    <div class="piano" id="piano" role="group" aria-label="鍵盤"></div>
  </div>
  <p class="readout" id="readout">鍵盤を押すと音を確認できます</p>

  <div class="actions">
    <button class="btn btn-ghost" id="replayBtn" disabled>♫ もう一度聴く</button>
    <button class="btn btn-primary" id="mainBtn">スタート ▶</button>
  </div>

  <details class="panel" id="masteryPanel">
    <summary>
      <span>習熟度</span>
      <span class="current" id="masterySummary">まだ記録なし</span>
      <span class="chev">▾</span>
    </summary>
    <div class="panel-body">
      <div class="m-head">
        <span class="m-name">和音</span>
        <span class="m-bar-label">習熟度</span>
        <span class="m-num-label">100%まで</span>
      </div>
      <div class="mastery" id="mastery"></div>
    </div>
  </details>

  <details class="panel" id="settings">
    <summary>
      <span>出題モード</span>
      <span class="current" id="modeSummary">メジャー</span>
      <span class="chev">▾</span>
    </summary>
    <div class="panel-body">
      <p class="sec-label">プリセット</p>
      <div class="presets">
        <button class="preset" data-preset="basic">基本</button>
        <button class="preset" data-preset="triad">三和音</button>
        <button class="preset" data-preset="seventh">四和音</button>
        <button class="preset" data-preset="all">すべて</button>
      </div>
      <p class="sec-label">個別選択</p>
      <div class="chips" id="chips"></div>


      <p class="sec-label">制限時間（回答時間のみ）</p>
      <div class="presets" id="limitRow">
        <button class="preset" data-limit="0">なし</button>
        <button class="preset" data-limit="auto">自動</button>
        <button class="preset" data-limit="15">15秒</button>
        <button class="preset" data-limit="10">10秒</button>
        <button class="preset" data-limit="6">6秒</button>
      </div>


      <div class="opt-row">
        <label id="labelSwitchLabel">
          鍵盤に音名を表示
          <span class="hint">オフにすると難易度が上がります</span>
        </label>
        <div class="switch" id="labelSwitch" role="switch" tabindex="0" aria-checked="true" aria-labelledby="labelSwitchLabel"></div>
      </div>

      <div class="opt-row">
        <label id="resetLabel">
          記録をリセット
          <span class="hint">復習キューと進捗を消去します</span>
        </label>
        <button class="preset" id="resetBtn">リセット</button>
      </div>
    </div>
  </details>

  <div class="cheer" id="cheer" hidden>
    <div class="cheer-card" role="dialog" aria-modal="true" aria-labelledby="cheerTitle">
      <div class="cheer-mark" id="cheerMark"></div>
      <p class="cheer-title" id="cheerTitle">平均 100%！</p>
      <p class="cheer-body">
        おつかれさま。<br>
        いつも遊んでくれてありがとう。<br>また明日も遊んでね。
      </p>
      <button class="btn btn-primary cheer-close" id="cheerClose">とじる</button>
    </div>
  </div>

  <footer>
    問題はC3〜C6の3オクターブからランダムな高さ・転回形で鳴ります。<br>
    回答は音名だけで判定するので、鍵盤は1オクターブです。<br>
    <kbd>Space</kbd> もう一度聴く ・ <kbd>Enter</kbd> 回答／次の問題 ・ <kbd>Esc</kbd> 選択をクリア
  </footer>

</div>

<script>
(function(){
  "use strict";

  /* ══ Data ══════════════════════════════ */
  const NOTES = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];

  const MODES = [
    { id:'single', label:'単音',            sym:'1',    iv:[0]        },
    { id:'dyad5',  label:'2音（5度）',      sym:'5',    iv:[0,7]      },
    { id:'major',  label:'メジャー',        sym:'maj',  iv:[0,4,7]    },
    { id:'minor',  label:'マイナー',        sym:'m',    iv:[0,3,7]    },
    { id:'dim',    label:'ディミニッシュ',  sym:'dim',  iv:[0,3,6]    },
    { id:'aug',    label:'オーギュメント',  sym:'aug',  iv:[0,4,8]    },
    { id:'sus2',   label:'サス2',           sym:'sus2', iv:[0,2,7]    },
    { id:'sus4',   label:'サス4',           sym:'sus4', iv:[0,5,7]    },
    { id:'dom7',   label:'セブンス',        sym:'7',    iv:[0,4,7,10] },
    { id:'maj7',   label:'メジャー7',       sym:'maj7', iv:[0,4,7,11] },
    { id:'min7',   label:'マイナー7',       sym:'m7',   iv:[0,3,7,10] },
    { id:'m7b5',   label:'ハーフディム',    sym:'m7♭5', iv:[0,3,6,10] },
    { id:'dim7',   label:'ディミニッシュ7', sym:'dim7', iv:[0,3,6,9]  }
  ];
  const MODE_BY_ID = Object.fromEntries(MODES.map(m => [m.id, m]));

  const PRESETS = {
    basic:   ['single','major','minor'],
    triad:   ['major','minor','dim','aug','sus2','sus4'],
    seventh: ['dom7','maj7','min7','m7b5','dim7'],
    all:     MODES.map(m => m.id)
  };

  const Q_LOW = 48, Q_HIGH = 84;
  const KB_LOW = 60, KB_HIGH = 71;
  const BLACK_PC = new Set([1,3,6,8,10]);
  const SET_SIZE = 10;
  const STORE_KEY = 'earTrainer';
  const LIMITS = ['0', 'auto', '15', '10', '6'];
  const CHORD_MS = 1800;      // 和音が鳴り終わるまで（この間は計時しない）
  const ADVANCE_LOCK_MS = 350; // 回答直後の誤タップで問題を飛ばさないための無効時間
  const MAX_HISTORY = 200, MAX_REVIEW = 20;

  /* ══ DOM refs ══════════════════════════ */
  const $ = id => document.getElementById(id);
  const pianoEl=$('piano'), promptEl=$('prompt'), pIcon=$('promptIcon'),
        pTitle=$('promptTitle'), pSub=$('promptSub'), pHint=$('promptHint'),
        readout=$('readout'), mainBtn=$('mainBtn'),
        replayBtn=$('replayBtn'), revealBtn=$('revealBtn'), chipsEl=$('chips'),
        modeSummary=$('modeSummary'), labelSwitch=$('labelSwitch'),
        pipsEl=$('pips'), sessionLabel=$('sessionLabel'),
        setLabel=$('setLabel'), starsEl=$('stars'),
        masteryEl=$('mastery'), masterySummary=$('masterySummary'),
        cheerEl=$('cheer'), cheerClose=$('cheerClose'),
        cheerMark=$('cheerMark'),
        resetBtn=$('resetBtn'), timerEl=$('timer'), timerFill=$('timerFill'), timerNum=$('timerNum'),
        limitRow=$('limitRow');

  /* ══ Persisted state ═══════════════════ */

  // 習熟度＝ベータ分布の事後平均のパラメータ
  // 習熟度は 0〜100 のカウンタ。正解で +GAIN、誤答で -LOSS。
  // GAIN=10 なので 10問連続正解でちょうど100%。
  // LOSS=20 は「正答率が 20/(10+20) = 67% を超えないと上がらない」ことを意味し、
  // まぐれ当たりでは到達できない水準にしてある。
  const GAIN = 10, LOSS = 20;

  const defaults = {
    modes:['single','major','minor'], showLabels:true,
    limit:'0',
    review:[], history:[], mastery:{}
  };
  let S = load();

  function load(){
    const o = structuredClone(defaults);
    try{
      const raw = localStorage.getItem(STORE_KEY);
      if(!raw) return o;
      const prev = JSON.parse(raw) || {};

      if(Array.isArray(prev.modes)){
        const ms = prev.modes.filter(id => MODE_BY_ID[id]);
        if(ms.length) o.modes = ms;
      }
      if(typeof prev.showLabels === 'boolean') o.showLabels = prev.showLabels;
      if(LIMITS.includes(prev.limit)) o.limit = prev.limit;

      if(prev.mastery && typeof prev.mastery === 'object'){
        for(const [id, r] of Object.entries(prev.mastery)){
          if(!MODE_BY_ID[id] || !r) continue;
          const n = +r.n, ok = +r.ok, v = +r.v;
          if(Number.isFinite(n) && Number.isFinite(ok) && Number.isFinite(v) &&
             n >= 0 && ok >= 0 && ok <= n && v >= 0 && v <= 100){
            o.mastery[id] = { n, ok, v };
          }
        }
      }
      if(Array.isArray(prev.history)){
        o.history = prev.history
          .filter(n => Number.isInteger(n) && n >= 0 && n <= SET_SIZE)
          .slice(-MAX_HISTORY);
      }
      if(Array.isArray(prev.review)){
        o.review = prev.review.filter(isReviewItem).slice(0, MAX_REVIEW);
      }
      return o;
    }catch(_){ return structuredClone(defaults); }
  }

  function isReviewItem(t){
    return !!t && MODE_BY_ID[t.modeId] &&
      Number.isInteger(t.root) && Number.isInteger(t.inv) &&
      typeof t.key === 'string' &&
      Number.isFinite(t.box) && Number.isFinite(t.due);
  }

  function save(){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(S)); }catch(_){}
  }



  /* ══ Runtime state ═════════════════════ */
  const active = new Set(S.modes);
  let phase = 'idle';
  let question = null;
  // 完了済みセット数から通し番号を復元する（リロードで星が消えないように）
  let setNo = S.history.length + 1;
  let setsToday = 0;   // このセッションで終えたセット数
  let setResults = [];
  const reviewQueue = S.review;         // 復習キューは日をまたいで保持
  const selected = new Set();
  const keyEls = new Map();

  const noteName = m => NOTES[m % 12];
  const fullName = m => NOTES[m % 12] + (Math.floor(m / 12) - 1);
  const clamp = (v,a,b) => Math.max(a, Math.min(b, v));

  /* ══ Audio ═════════════════════════════ */
  let ctx = null, master = null;
  function audio(){
    if(!ctx){
      const AC = window.AudioContext || window.webkitAudioContext;
      ctx = new AC();
      master = ctx.createGain();
      master.gain.value = 0.9;
      master.connect(ctx.destination);
    }
    if(ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function tone(midi, at, level, dur){
    const c = audio();
    const f = 440 * Math.pow(2, (midi - 69) / 12);
    const D = dur || 1.7;
    const g = c.createGain(); g.connect(master);
    g.gain.setValueAtTime(0.0001, at);
    g.gain.linearRampToValueAtTime(level, at + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, at + D);
    const o1 = c.createOscillator();
    o1.type='triangle'; o1.frequency.value=f;
    o1.connect(g); o1.start(at); o1.stop(at + D + 0.05);
    const o2 = c.createOscillator(), g2 = c.createGain();
    o2.type='sine'; o2.frequency.value=f*2;
    g2.gain.setValueAtTime(0.0001, at);
    g2.gain.linearRampToValueAtTime(level*0.16, at + 0.012);
    g2.gain.exponentialRampToValueAtTime(0.0001, at + D*0.65);
    o2.connect(g2); g2.connect(master);
    o2.start(at); o2.stop(at + D*0.7);
  }
  function playChord(midis){
    const c = audio(), at = c.currentTime + 0.04;
    const level = 0.34 / Math.sqrt(midis.length);
    midis.forEach((m,i) => tone(m, at + i*0.012, level));
  }
  function playSingle(midi){ tone(midi, audio().currentTime + 0.002, 0.26); }

  /* 短いフィードバック音（過剰演出は避ける） */
  function cue(ok){
    const c = audio(), at = c.currentTime + 0.02;
    const seq = ok ? [79, 84] : [63, 60];
    seq.forEach((m,i) => tone(m, at + i*0.09, 0.13, 0.35));
  }

  /* ══ Build keyboard ════════════════════ */
  (function buildPiano(){
    const whites = [];
    for(let m = KB_LOW; m <= KB_HIGH; m++) if(!BLACK_PC.has(m % 12)) whites.push(m);
    const wUnit = 100 / whites.length, bW = wUnit * 0.58;
    let wIdx = 0;
    for(let m = KB_LOW; m <= KB_HIGH; m++){
      const black = BLACK_PC.has(m % 12);
      const el = document.createElement('div');
      el.className = black ? 'bk' : 'wk';
      el.dataset.midi = m; el.tabIndex = 0;
      el.setAttribute('role','button');
      el.setAttribute('aria-label', noteName(m));
      el.setAttribute('aria-pressed','false');
      el.innerHTML = '<span class="deg"></span><span class="lbl">' + noteName(m) + '</span>';
      if(black){
        el.style.left = (wIdx*wUnit - bW/2) + '%';
        el.style.width = bW + '%';
      } else wIdx++;
      pianoEl.appendChild(el);
      keyEls.set(m, el);
    }
  })();

  keyEls.forEach((el, midi) => {
    el.addEventListener('pointerdown', e => { e.preventDefault(); pressKey(midi); });
    el.addEventListener('keydown', e => {
      if(e.key === 'Enter' || e.key === ' '){
        e.preventDefault(); e.stopPropagation(); pressKey(midi);
      }
    });
  });

  function pressKey(midi){
    playSingle(midi);
    if(phase !== 'answering') return;
    selected.has(midi) ? selected.delete(midi) : selected.add(midi);
    paintKeys(); updateReadout(); syncButtons();
  }

  function paintKeys(marks){
    keyEls.forEach((el, midi) => {
      el.classList.remove('on','ok','ng','miss');
      el.setAttribute('aria-pressed', selected.has(midi) ? 'true' : 'false');
      const deg = el.querySelector('.deg');
      deg.textContent = '';
      if(marks){
        const pc = midi % 12;
        if(selected.has(midi))       el.classList.add(marks.right.has(pc) ? 'ok' : 'ng');
        else if(marks.right.has(pc)) el.classList.add('miss');
        // 根音からの度数を正解構成音に表示（転回しても不変）
        if(marks.deg && marks.deg.has(pc)) deg.textContent = marks.deg.get(pc);
      } else if(selected.has(midi)) el.classList.add('on');
    });
    pianoEl.classList.toggle('frozen', phase !== 'answering');
    pianoEl.classList.toggle('show-deg', !!(marks && marks.deg));
  }

  // 正解和音の各音に P1 / M3 / P5 などを割り当てる
  function degreeMap(q){
    const m = new Map();
    q.mode.iv.forEach(iv => m.set((q.root + iv) % 12, IV_NAME[iv % 12]));
    return m;
  }

  function updateReadout(){
    if(phase === 'idle'){ readout.innerHTML = '鍵盤を押すと音を確認できます'; return; }
    if(!selected.size){ readout.innerHTML = '選択中: <b>なし</b>'; return; }
    const names = [...selected].sort((a,b)=>a-b).map(noteName);
    readout.innerHTML = '選択中: <b>' + names.join('  ') + '</b>';
  }

  /* ══ Prompt / stats ════════════════════ */
  function setPrompt(kind, icon, title, sub, hint){
    promptEl.className = 'prompt' + (kind ? ' ' + kind : '');
    pIcon.textContent = icon;
    pTitle.textContent = title;
    pSub.textContent = sub;
    if(hint){ pHint.textContent = hint; pHint.hidden = false; }
    else pHint.hidden = true;
  }


  function renderPips(){
    pipsEl.innerHTML = '';
    for(let i = 0; i < SET_SIZE; i++){
      const d = document.createElement('div');
      d.className = 'pip' + (setResults[i] ? ' ' + setResults[i]
                    : (i === setResults.length && phase === 'answering' ? ' now' : ''));
      pipsEl.appendChild(d);
    }
    setLabel.textContent = 'セット ' + setNo;
    sessionLabel.textContent =
      Math.min(setResults.length + (phase==='answering'?1:0), SET_SIZE) + '/' + SET_SIZE + '問';
    renderStars();
  }

  // 完了セットごとに星を1つ。色が成績を表す
  const STAR_TIERS = [
    { min:8, cls:'green',  ch:'★', label:'8問以上' },
    { min:5, cls:'yellow', ch:'★', label:'5〜7問' },
    { min:0, cls:'red',    ch:'★', label:'4問以下' }
  ];
  function starFor(ok){ return STAR_TIERS.find(t => ok >= t.min); }

  // 習熟度＝ベータ分布の事後平均。直近を重視しつつ試行回数も反映する。
  function masteryOf(r){ return r.v / 100; }
  // 100%までに必要な連続正解数
  function toGo(r){ return Math.ceil((100 - r.v) / GAIN); }

  function recordMastery(id, ok){
    const r = S.mastery[id] || (S.mastery[id] = { n:0, ok:0, v:0 });
    r.n++; if(ok) r.ok++;
    r.v = clamp(r.v + (ok ? GAIN : -LOSS), 0, 100);
  }

  // バーと数字は同じ指標（正解数 / 出題数）を示す
  function renderMastery(){
    const rows = MODES.filter(m => S.mastery[m.id] && S.mastery[m.id].n > 0);
    masteryEl.innerHTML = '';
    if(!rows.length){
      const p = document.createElement('p');
      p.className = 'm-empty';
      p.textContent = '問題に答えると、和音ごとの習熟度がここに出ます。';
      masteryEl.appendChild(p);
      masterySummary.textContent = 'まだ記録なし';
      return;
    }
    const avg = Math.round(rows.reduce((x,m) => x + masteryOf(S.mastery[m.id]), 0) / rows.length * 100);
    // 正答率の低い順＝苦手が上に来る
    rows.sort((a,b) => masteryOf(S.mastery[a.id]) - masteryOf(S.mastery[b.id]));
    rows.forEach(m => {
      const r = S.mastery[m.id];
      const pct = Math.round(masteryOf(r) * 100);
      const mastered = pct >= 100;
      const row = document.createElement('div');
      row.className = 'm-row' + (mastered ? ' done' : '');
      row.title = m.label + ' — 習熟度 ' + pct + '%（通算 ' + r.ok + '/' + r.n + '問正解）';

      const name = document.createElement('span');
      name.className = 'm-name';
      name.textContent = m.label;

      const pctEl = document.createElement('span');
      pctEl.className = 'm-pct'; pctEl.textContent = pct + '%';

      const bar = document.createElement('span');
      bar.className = 'm-bar';
      const fill = document.createElement('span');
      fill.className = 'm-fill' + (pct < 50 ? ' low' : pct < 80 ? ' mid' : '');
      fill.style.width = pct + '%';
      bar.appendChild(fill);

      const num = document.createElement('span');
      num.className = 'm-num';
      if(pct >= 100){
        num.innerHTML = '<b>100%</b>';
        num.classList.add('full');
      } else {
        num.innerHTML = '<b>あと' + toGo(r) + '</b><i>問</i>';
      }

      row.appendChild(name); row.appendChild(pctEl); row.appendChild(bar); row.appendChild(num);
      masteryEl.appendChild(row);
    });
    masterySummary.textContent = '平均 ' + avg + '% ／ 苦手 ' + rows[0].label;
  }

  // 選択中の和音すべてが100%になったら1度だけ祝う
  let cheered = false;

  // 終えたセット数だけ星を並べる。8を超えたら星1つ＋数字に切り替える
  const CHEER_MAX_STARS = 8;
  function renderCheerStars(n){
    cheerMark.innerHTML = '';
    const many = n > CHEER_MAX_STARS;
    const stars = many ? 1 : Math.max(n, 1);
    cheerMark.className = 'cheer-mark' + (stars === 1 ? ' solo' : '');
    for(let i = 0; i < stars; i++){
      const st = document.createElement('span');
      st.textContent = '★';
      st.style.animationDelay = (i * 0.05) + 's';
      cheerMark.appendChild(st);
    }
    if(many){
      const c = document.createElement('span');
      c.className = 'count';
      c.textContent = n;
      c.style.animationDelay = '0.12s';
      cheerMark.appendChild(c);
    }
  }
  function checkCheer(){
    const sel = MODES.filter(m => active.has(m.id));
    const rec = sel.filter(m => S.mastery[m.id] && S.mastery[m.id].n > 0);
    const allFull = rec.length === sel.length && rec.length > 0 &&
      rec.every(m => Math.round(masteryOf(S.mastery[m.id]) * 100) >= 100);
    if(allFull && !cheered){
      cheered = true;
      renderCheerStars(setsToday);
      cheerEl.hidden = false;
      cheerClose.focus();
    } else if(!allFull){
      cheered = false;
    }
  }

  function renderStars(){
    starsEl.innerHTML = '';
    // 現在のセットぶんは、次のセットに進んでから星をつける
    // （10問目を答えた画面で「セット1」と星が同時に出るのを防ぐ）
    const done = S.history.slice(0, setNo - 1);
    if(!done.length){
      const hint = document.createElement('span');
      hint.className = 'star-hint';
      hint.textContent = '10問ごとに星がつきます';
      starsEl.appendChild(hint);
      return;
    }
    done.forEach((ok, i) => {
      const tier = starFor(ok);
      const el = document.createElement('span');
      el.className = 'star ' + tier.cls + (ok === SET_SIZE ? ' perfect' : '');
      el.textContent = tier.ch;
      el.title = 'セット ' + (i + 1) + ': ' + ok + '/' + SET_SIZE;
      starsEl.appendChild(el);
    });
  }

  const INV_NAME = ['', '第1転回', '第2転回', '第3転回'];
  const chordLabel = q => {
    if(q.mode.iv.length === 1) return NOTES[q.root] + '（単音）';
    const nm = NOTES[q.root] + (q.mode.id === 'major' ? '' : q.mode.sym);
    return q.inv ? nm + '（' + INV_NAME[q.inv] + '）' : nm;
  };
  const IV_NAME = ['P1','m2','M2','m3','M3','P4','TT','P5','m6','M6','m7','M7'];
  // 実際に鳴った順（低い音から）
  function voicingSpell(q){
    const sorted = q.midis.slice().sort((a,b) => a - b);
    const bass = sorted[0];
    return sorted.map((m,i) => {
      const semi = (m - bass) % 12;
      return fullName(m) + (i === 0 ? '' : ' ' + IV_NAME[semi]);
    }).join(' – ');
  }



  /* ══ Time limit ════════════════════════
     計時は「音が鳴り終わってから」開始し、回答時間だけを測る。
     再生中は計時しないので、もう一度聴いても損をしない。 */
  let tRAF = 0, tEnd = 0, tTotal = 0, tPausedAt = 0;

  // 自動: ヒックの法則 RT = a + b*log2(N)
  //   N は「12鍵から n 個選ぶ」組み合わせ数（1/2/3/4音 = 12/66/220/495通り）。
  // 締切は「知覚＋タップ入力＋確認」の所要時間の中央値をもとに、
  // 反応時間分布の75パーセンタイル（心理学実験で締切設定に使われる基準）に置いた。
  //   1音 = 知覚2.5s + タップ0.6s + 確認1.2s ≒ 4.3s（中央値）→ 締切6秒
  // 結果は 1/2/3/4音 = 6/9/11/12秒。増え方は徐々に緩やかになる。
  function comb(n, k){
    let r = 1;
    for(let i = 0; i < k; i++) r = r * (n - i) / (i + 1);
    return r;
  }
  function limitSeconds(){
    if(S.limit === '0') return 0;
    if(S.limit === 'auto'){
      const n = question ? question.midis.length : 3;
      return clamp(Math.round(1.31 + 1.22 * Math.log2(comb(12, n))), 5, 16);
    }
    return +S.limit;
  }

  function stopTimer(){
    if(tRAF) cancelAnimationFrame(tRAF);
    tRAF = 0;
    timerEl.hidden = true;
  }

  function tick(){
    const left = tEnd - performance.now();
    const frac = clamp(left / tTotal, 0, 1);
    const cls = frac < 0.2 ? ' crit' : frac < 0.5 ? ' warn' : '';
    timerFill.style.width = (frac * 100) + '%';
    timerFill.className = 'timer-fill' + cls;
    timerNum.textContent = Math.max(0, Math.ceil(left / 1000));
    timerNum.className = 'timer-num' + cls;
    if(left <= 0){ stopTimer(); timeUp(); return; }
    tRAF = requestAnimationFrame(tick);
  }

  function startTimer(){
    const secs = limitSeconds();
    if(!secs || phase !== 'answering'){ stopTimer(); return; }
    tTotal = secs * 1000;
    tEnd = performance.now() + tTotal;
    timerEl.hidden = false;
    timerFill.style.width = '100%';
    timerFill.className = 'timer-fill';
    timerNum.textContent = Math.ceil(secs);
    timerNum.className = 'timer-num';
    if(tRAF) cancelAnimationFrame(tRAF);
    tRAF = requestAnimationFrame(tick);
  }

  // 再生中は一時停止（聴き直しでペナルティを受けない）
  function pauseTimerFor(ms){
    if(!tRAF) return;
    cancelAnimationFrame(tRAF); tRAF = 0;
    tPausedAt = tEnd - performance.now();
    setTimeout(() => {
      if(phase !== 'answering') return;
      tEnd = performance.now() + tPausedAt;
      tRAF = requestAnimationFrame(tick);
    }, ms);
  }

  function timeUp(){
    if(phase !== 'answering' || !question) return;
    const right = new Set(question.midis.map(m => m % 12));
    phase = 'resolved';
    finishRound(false, false);
    paintKeys({ right, deg: degreeMap(question) });
    cue(false);
    setPrompt('wrong','⏱','時間切れ — 正解は ' + chordLabel(question),
              voicingSpell(question), setEndMessage());
    syncButtons();
  }


  function rootMidiFor(root, span){
    const opts = [];
    for(let m = Q_LOW; m <= Q_HIGH - span; m++) if(m % 12 === root) opts.push(m);
    return opts[Math.floor(Math.random() * opts.length)];
  }

  // 転回形: 実際の音楽で和音は基本形で鳴るとは限らない
  function voice(iv, inv){
    if(!inv) return iv.slice();
    const a = iv.slice();
    for(let i = 0; i < inv; i++) a.push(a.shift() + 12);
    const base = a[0];
    return a.map(x => x - base);
  }

  // Leitner式: 間違えた課題は間隔を空けて再出題し、正解するたび間隔を伸ばす
  // due は前回セッションの通し番号基準なので、読み込み時に 0 起点へ詰め直す
  // 復習キュー: 間違えた課題を間隔を空けて再出題する（Leitner方式）。
  // due は「解いた問題数」を時計にした期限。box が上がるほど間隔が伸び、
  // GRADUATE 回連続で正解したらキューから外れる。
  const REVIEW_GAPS = [0, 2, 5, 9, 14];   // box -> 次に出すまでの間隔
  const GRADUATE = 4;
  let solved = 0;                          // 出題した問題数（due の基準）

  // 保存された due は前回セッションの基準なので、0起点へ詰め直す
  (function rebaseDue(){
    if(!reviewQueue.length) return;
    const min = Math.min(...reviewQueue.map(t => t.due));
    reviewQueue.forEach(t => { t.due = Math.max(0, t.due - min); });
  })();

  function dueReview(){
    return reviewQueue.findIndex(t => t.due <= solved && active.has(t.modeId));
  }

  function scheduleReview(key, ok){
    const i = reviewQueue.findIndex(t => t.key === key);

    if(!ok){
      if(i >= 0){
        reviewQueue[i].box = 1;
        reviewQueue[i].due = solved + REVIEW_GAPS[1];
      } else {
        const [modeId, root, inv] = key.split(':');
        reviewQueue.push({
          key, modeId, root: +root, inv: +inv,
          box: 1, due: solved + REVIEW_GAPS[1]
        });
        if(reviewQueue.length > MAX_REVIEW) reviewQueue.shift();
      }
    } else if(i >= 0){
      const t = reviewQueue[i];
      t.box++;
      if(t.box > GRADUATE) reviewQueue.splice(i, 1);
      else t.due = solved + REVIEW_GAPS[t.box];
    }

    S.review = reviewQueue;
  }

  function pickTask(){
    const pool = MODES.filter(m => active.has(m.id));
    if(!pool.length) return null;

    const idx = dueReview();
    if(idx >= 0){
      const t = reviewQueue[idx];
      return { mode: MODE_BY_ID[t.modeId], root: t.root, inv: t.inv, review: true };
    }
    const mode = pool[Math.floor(Math.random() * pool.length)];
    // 転回形は常に自然に混ぜる
    const maxInv = mode.iv.length > 1 ? mode.iv.length - 1 : 0;
    return {
      mode,
      root: Math.floor(Math.random() * 12),
      inv: maxInv ? Math.floor(Math.random() * (maxInv + 1)) : 0,
      review: false
    };
  }

  function nextRound(){
    if(setResults.length >= SET_SIZE) startNewSet();
    const task = pickTask();
    if(!task) return;
    const iv = voice(task.mode.iv, task.inv || 0);
    const shift = (task.inv ? task.mode.iv[task.inv] % 12 : 0);
    const bassPc = (task.root + shift) % 12;
    const base = rootMidiFor(bassPc, Math.max(...iv));
    question = {
      mode: task.mode, root: task.root, inv: task.inv || 0,
      midis: iv.map(x => base + x), review: task.review,
      key: task.mode.id + ':' + task.root + ':' + (task.inv || 0)
    };

    phase = 'answering';
    selected.clear();
    paintKeys(); updateReadout();
    setPrompt('', '♪', '鳴った音を鍵盤から選んでください',
      '選び終えたら「回答する」を押します',
      task.review ? '↻ 復習問題' : null);
    renderPips(); syncButtons();
    playChord(question.midis);
    stopTimer();
    if(limitSeconds()) setTimeout(() => { if(phase === 'answering') startTimer(); }, CHORD_MS);
  }

  function startNewSet(){
    setNo++; setResults = []; save();
  }

  function recordSet(){
    const ok = setResults.filter(r => r === 'ok').length;
    setsToday++;
    S.history.push(ok);
    if(S.history.length > MAX_HISTORY) S.history.shift();
    save();
  }

  function replay(){
    if(!question) return;
    playChord(question.midis);
    pauseTimerFor(CHORD_MS);
  }

  function finishRound(isRight, revealed){
    solved++;
    // 「答えを見る」は採点しない（習熟度・セット進捗・お祝いに影響させない）。
    // ただし復習キューには積む＝あとでもう一度出題される。
    scheduleReview(question.key, revealed ? false : isRight);
    if(revealed){
      save();
      return;
    }
    recordMastery(question.mode.id, isRight);
    setResults.push(isRight ? 'ok' : 'ng');
    if(setResults.length === SET_SIZE) recordSet();
    save();
    renderPips(); renderMastery();
    checkCheer();
  }

  // 何が惜しかったかを具体的に返す（有能感を支える即時フィードバック）
  function diffText(right, given){
    const missing = [...right].filter(pc => !given.has(pc)).map(pc => NOTES[pc]);
    const extra   = [...given].filter(pc => !right.has(pc)).map(pc => NOTES[pc]);
    const parts = [];
    if(missing.length) parts.push('不足: ' + missing.join(' '));
    if(extra.length)   parts.push('余分: ' + extra.join(' '));
    return parts.join(' ／ ');
  }

  function setEndMessage(){
    if(setResults.length < SET_SIZE) return null;
    const ok = setResults.filter(r => r === 'ok').length;
    const base = 'セット ' + setNo + ' 完了 — ' + ok + '/' + SET_SIZE;
    const past = S.history.slice(0, -1);
    if(!past.length) return base;
    if(ok > Math.max(...past)) return base + '（これまでの最高）';
    const total = S.history.reduce((a,b) => a + b, 0);
    return base + ' ／ 累計 ' + total + '問正解';
  }

  function submit(){
    if(phase !== 'answering' || !question || !selected.size) return;
    const right = new Set(question.midis.map(m => m % 12));
    const given = new Set([...selected].map(m => m % 12));
    const isRight = given.size === right.size && [...right].every(pc => given.has(pc));

    phase = 'resolved';
    stopTimer();
    finishRound(isRight, false);
    paintKeys({ right, deg: degreeMap(question) });
    cue(isRight);

    const setMsg = setEndMessage();
    if(isRight){
      setPrompt('correct','✓','正解 — ' + chordLabel(question), voicingSpell(question), setMsg);
    } else {
      setPrompt('wrong','✕','不正解 — 正解は ' + chordLabel(question),
                voicingSpell(question), setMsg || diffText(right, given));
    }
    syncButtons();
  }

  function reveal(){
    if(phase !== 'answering' || !question) return;
    const right = new Set(question.midis.map(m => m % 12));
    phase = 'resolved';
    stopTimer();
    finishRound(false, true);
    paintKeys({ right, deg: degreeMap(question) });
    setPrompt('info','♪', chordLabel(question), voicingSpell(question), setEndMessage());
    syncButtons();
  }

  function clearSelection(){
    if(phase === 'resolved' || !selected.size) return;
    selected.clear(); paintKeys(); updateReadout(); syncButtons();
  }

  /* ══ Buttons ═══════════════════════════ */
  function syncButtons(){
    if(phase === 'idle'){
      mainBtn.textContent = 'スタート ▶';
      mainBtn.disabled = false;
      replayBtn.disabled = true;
      revealBtn.hidden = true;
    } else if(phase === 'answering'){
      mainBtn.textContent = '回答する ✓';
      mainBtn.disabled = !selected.size;
      replayBtn.disabled = false;
      revealBtn.hidden = false;
    } else {
      const done = setResults.length >= SET_SIZE;
      mainBtn.textContent = done ? '次のセットへ ▶' : '次の問題へ ▶';
      mainBtn.disabled = false;
      replayBtn.disabled = false;
      revealBtn.hidden = true;
    }
  }

  /* ══ Modes UI ══════════════════════════ */
  function renderSummary(){
    if(active.size === MODES.length){ modeSummary.textContent = 'すべて（' + MODES.length + '種類）'; return; }
    const names = MODES.filter(m => active.has(m.id)).map(m => m.label);
    modeSummary.textContent = names.length <= 2 ? names.join('・')
      : names[0] + '・' + names[1] + ' 他' + (names.length - 2);
  }
  function persistModes(){ S.modes = [...active]; save(); }

  MODES.forEach(mode => {
    const chip = document.createElement('button');
    chip.type = 'button'; chip.className = 'chip';
    chip.setAttribute('aria-pressed', String(active.has(mode.id)));
    chip.innerHTML = mode.label + '<span class="sym">' + mode.sym + '</span>';
    chip.addEventListener('click', () => {
      if(active.has(mode.id)){
        if(active.size === 1) return;
        active.delete(mode.id);
      } else active.add(mode.id);
      chip.setAttribute('aria-pressed', String(active.has(mode.id)));
      renderSummary(); persistModes(); syncButtons();
    });
    chipsEl.appendChild(chip);
  });

  function applyPreset(name){
    active.clear();
    PRESETS[name].forEach(id => { if(MODE_BY_ID[id]) active.add(id); });
    [...chipsEl.children].forEach((chip,i) =>
      chip.setAttribute('aria-pressed', String(active.has(MODES[i].id))));
    renderSummary(); persistModes(); syncButtons();
  }
  document.querySelectorAll('.preset[data-preset]').forEach(btn =>
    btn.addEventListener('click', () => applyPreset(btn.dataset.preset)));

  /* ══ Switches ══════════════════════════ */
  function applyLabels(){
    labelSwitch.setAttribute('aria-checked', String(S.showLabels));
    pianoEl.classList.toggle('hide-labels', !S.showLabels);
  }
  function applyLimit(){
    [...limitRow.children].forEach(b =>
      b.setAttribute('aria-pressed', String(b.dataset.limit === S.limit)));
    if(!limitSeconds()) stopTimer();
  }
  limitRow.querySelectorAll('.preset').forEach(btn => {
    btn.addEventListener('click', () => {
      S.limit = btn.dataset.limit;
      save(); applyLimit();
      if(phase === 'answering'){
        limitSeconds() ? startTimer() : stopTimer();
      }
    });
  });


  function bindSwitch(el, get, set){
    const t = () => { set(!get()); save(); };
    el.addEventListener('click', t);
    el.addEventListener('keydown', e => {
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); t(); }
    });
  }
  bindSwitch(labelSwitch, () => S.showLabels, v => { S.showLabels = v; applyLabels(); });

  resetBtn.addEventListener('click', () => {
    if(!confirm('記録をすべて消去します。よろしいですか？')) return;
    reviewQueue.length = 0; S.review = reviewQueue;
    S.history = []; S.mastery = {};
    setResults = []; setNo = 1; solved = 0; setsToday = 0;
    save(); renderPips(); renderMastery();
  });

  /* ══ Wiring ════════════════════════════ */
  // 回答直後は同じ位置のボタンが「次の問題へ」に変わるため、
  // 連打で問題を飛ばさないよう短い無効時間を置く
  let advanceLockUntil = 0;
  mainBtn.addEventListener('click', () => {
    if(phase === 'answering'){
      submit();
      advanceLockUntil = performance.now() + ADVANCE_LOCK_MS;
      return;
    }
    if(performance.now() < advanceLockUntil) return;
    nextRound();
  });
  cheerClose.addEventListener('click', () => { cheerEl.hidden = true; });
  cheerEl.addEventListener('click', e => { if(e.target === cheerEl) cheerEl.hidden = true; });

  replayBtn.addEventListener('click', replay);
  revealBtn.addEventListener('click', reveal);

  document.addEventListener('keydown', e => {
    const t = e.target;
    if(!cheerEl.hidden){
      if(e.key === 'Escape' || e.key === 'Enter' || e.key === ' '){
        e.preventDefault();
        cheerEl.hidden = true;
      }
      return;
    }
    if(t && (t.tagName === 'BUTTON' || t.classList.contains('wk') ||
             t.classList.contains('bk') || t === labelSwitch ||
             t.tagName === 'SUMMARY')) return;
    if(e.key === ' '){ e.preventDefault(); if(!replayBtn.disabled) replay(); }
    else if(e.key === 'Enter'){ e.preventDefault(); if(!mainBtn.disabled) mainBtn.click(); }
    else if(e.key === 'Escape'){ e.preventDefault(); clearSelection(); }
  });

  /* ══ Init ══════════════════════════════ */
  applyLabels(); applyLimit(); renderSummary();
  renderPips(); renderMastery();
  updateReadout(); paintKeys(); syncButtons();
})();
</script>
</body>
